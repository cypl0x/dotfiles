# hyprlock — lock screen with Doom Vibrant aesthetic
# Background: blurred screenshot of the desktop

background {
    monitor    =
    path       = screenshot
    blur_passes = 4
    blur_size   = 7
    noise       = 0.0117
    contrast    = 0.8916
    brightness  = 0.7
    vibrancy    = 0.1696
    vibrancy_darkness = 0.0
}

# Overlay panel — semi-transparent dark box behind controls
shape {
    monitor  =
    size     = 380, 320
    color    = rgba(1c1f24cc)
    rounding = 12
    border_size  = 2
    border_color = rgba(484854ff)
    position = 0, 0
    halign   = center
    valign   = center
}

# Clock — large, centred
label {
    monitor    =
    text       = cmd[update:1000] echo "$(date +"%H:%M")"
    color      = rgba(bbc2cfff)
    font_size  = 72
    font_family = Maple Mono NF Bold
    position   = 0, 100
    halign     = center
    valign     = center
}

# Date — force LC_ALL=C so weekday/month names are English, not the
# system locale (which was rendering them in German).
label {
    monitor    =
    text       = cmd[update:60000] echo "$(LC_ALL=C date +"%A, %d %B %Y")"
    color      = rgba(62686Eff)
    font_size  = 16
    font_family = Maple Mono NF
    position   = 0, 20
    halign     = center
    valign     = center
}

# System stats — battery + load + temperature, below the panel.
label {
    monitor    =
    text       = cmd[update:10000] ~/.config/hypr/scripts/lock-stats.sh
    color      = rgba(62686Eff)
    font_size  = 13
    font_family = Maple Mono NF
    position   = 0, -210
    halign     = center
    valign     = center
}

# Keyboard layout indicator
label {
    monitor    =
    text       = 󰌌  $LAYOUT
    color      = rgba(51afefff)
    font_size  = 12
    font_family = Maple Mono NF
    position   = 0, 150
    halign     = center
    valign     = center
}

# User avatar placeholder (circle)
shape {
    monitor  =
    size     = 64, 64
    color    = rgba(2a2e38ff)
    rounding = -1
    border_size  = 2
    border_color = rgba(51afefff)
    position = 0, -50
    halign   = center
    valign   = center
}

# Password input field
input-field {
    monitor    =
    size       = 300, 46
    outline_thickness = 2
    dots_size       = 0.25
    dots_spacing    = 0.64
    dots_center     = true
    dots_rounding   = -1
    outer_color     = rgba(484854ff)
    inner_color     = rgba(242730ff)
    font_color      = rgba(bbc2cfff)
    fade_on_empty   = true
    fade_timeout    = 1500
    placeholder_text = <span foreground="##62686E"><i>Password…</i></span>
    hide_input      = false
    rounding        = 6
    check_color     = rgba(51afefff)
    fail_color      = rgba(ff665cff)
    fail_text       = <span foreground="##ff665c"><i>$FAIL ($ATTEMPTS)</i></span>
    fail_timeout    = 2000
    capslock_color  = rgba(FCce7Bff)
    numlock_color   = -1
    bothlock_color  = -1
    invert_numlock  = false
    swap_font_color = false
    position        = 0, -120
    halign          = center
    valign          = center
}
