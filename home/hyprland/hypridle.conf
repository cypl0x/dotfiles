# hypridle — idle management
# Timeline:  3m dim → 5m lock → 10m dpms off → 30m suspend

general {
    lock_cmd          = pidof hyprlock || hyprlock   # avoid multiple instances
    before_sleep_cmd  = loginctl lock-session
    after_sleep_cmd   = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
}

# Step 1 — dim backlight at 3 minutes (restore on resume)
listener {
    timeout   = 180
    on-timeout  = brightnessctl -s set 10%
    on-resume   = brightnessctl -r
}

# Step 2 — lock at 5 minutes
listener {
    timeout   = 300
    on-timeout  = loginctl lock-session
}

# Step 3 — turn off display at 10 minutes (saves power on ThinkPad)
listener {
    timeout   = 600
    on-timeout  = hyprctl dispatch dpms off
    on-resume   = hyprctl dispatch dpms on
}

# Step 4 — suspend at 30 minutes
listener {
    timeout   = 1800
    on-timeout  = systemctl suspend
}
