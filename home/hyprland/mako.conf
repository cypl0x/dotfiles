# mako — notification daemon, Doom Vibrant theme
# Positioned top-right, like Doom's +popup module

sort=-time
layer=overlay
anchor=top-right

# Geometry
width=360
height=110
margin=10
padding=12
border-size=2
border-radius=8

# Colours (Doom Vibrant)
background-color=#242730ee
text-color=#bbc2cf
border-color=#484854ff

# Typography — match config.el font
font=Cascadia Code NF 12

# Timeouts
default-timeout=5000
ignore-timeout=0
max-visible=5

# Icons
icon-path=/usr/share/icons/hicolor
max-icon-size=48

# Markup
markup=1
actions=1
format=<b>%s</b>\n%b

# History (dismiss recoverable with makoctl restore)
history=1

# Urgency overrides
[urgency=low]
border-color=#484854ff
default-timeout=3000

[urgency=high]
background-color=#1c1f24ee
border-color=#ff665cff
text-color=#bbc2cf
default-timeout=0

# App-specific
[app-name=notify-send]
default-timeout=4000

[category=email]
border-color=#51afefff
default-timeout=8000
