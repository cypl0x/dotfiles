# hyprpaper wallpaper daemon
# Place your wallpaper at the path below, or change it.
# A solid Doom Vibrant background is used as fallback via hyprctl.
# Tip: run `hyprpaper` after placing a file at the path.

splash = false
ipc    = on

# Preload wallpaper into memory — uncomment after placing a file here:
# preload = ~/.config/hypr/wallpaper.jpg
# wallpaper = , ~/.config/hypr/wallpaper.jpg
