# hyprpaper wallpaper daemon
# Place your wallpaper at the path below, or change it.
# A solid Doom Vibrant background is used as fallback via hyprctl.
# Tip: run `hyprpaper` after placing a file at the path.

splash = false
ipc    = on

# Doom Vibrant wallpaper — generated at build time (see home/hyprland.nix) and
# linked to this path. Applied to all monitors.
# NOTE: hyprpaper does NOT expand a leading ~ — it silently loads nothing and
# you get a black screen. Use $HOME (hyprlang expands env vars).
preload   = $HOME/.config/hypr/wallpaper.png
wallpaper = , $HOME/.config/hypr/wallpaper.png
