# hyprpaper wallpaper daemon
# Place your wallpaper at the path below, or change it.
# A solid Doom Vibrant background is used as fallback via hyprctl.
# Tip: run `hyprpaper` after placing a file at the path.

splash = false
ipc    = on

# Doom Vibrant wallpaper — generated at build time (see home/hyprland.nix).
#
# NOTE: the wallpaper is NOT set here. hyprpaper 0.8.4's declarative
# `preload=`/`wallpaper=` directives produce no target on this setup
# ("Monitor eDP-1 has no target: no wp will be created" → black screen).
# It is applied imperatively over IPC instead — see
# home/hyprland/scripts/set-wallpaper.sh, launched from hyprland.conf.
