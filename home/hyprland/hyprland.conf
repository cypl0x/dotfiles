################
### MONITORS ###
################

# Use preferred resolution at auto position and 1x scale.
# Laptop internal display: auto-detect. Override per-host via sourced file if needed.
monitor = , preferred, auto, 1

###################
### MY PROGRAMS ###
###################

$terminal   = wezterm
$browser    = firefox
$fileManager = dolphin
$launcher   = rofi -show drun -show-icons -theme ~/.config/rofi/doom-vibrant.rasi
$clipMenu   = cliphist list | rofi -dmenu -p "Clipboard" -theme ~/.config/rofi/doom-vibrant.rasi | cliphist decode | wl-copy
$colorPick  = hyprpicker -a
$locker     = hyprlock
$powerMenu  = wlogout --protocol layer-shell

###############
### ENV VARS ##
###############

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adwaita
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_USE_XINPUT2,1
env = _JAVA_AWT_WM_NONREPARENTING,1
env = NIXOS_OZONE_WL,1

#################
### AUTOSTART ###
#################

# Status bar — bottom, Doom Vibrant themed
exec-once = waybar

# Notifications
exec-once = mako

# Wallpaper daemon
exec-once = hyprpaper

# Idle management (dims → locks → dpms off)
exec-once = hypridle

# Clipboard history (text + images)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Tray applets
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Polkit agent
exec-once = /run/current-system/sw/libexec/polkit-kde-authentication-agent-1

# Blue-light filter (enabled at sunset; configure via hyprsunset)
exec-once = hyprsunset -t 4500

# eww — nerdy system overlay (daemon + open the desktop panel)
exec-once = eww daemon && eww open syspanel

#####################
### LOOK AND FEEL ###
#####################

# Doom Vibrant palette:
#   bg        #242730    base0     #1c1f24
#   bg-alt    #2a2e38    base4     #3d4451
#   border-dim #484854   comment   #62686E
#   fg        #bbc2cf    blue      #51afef
#   red       #ff665c    green     #7bc275
#   yellow    #FCCE7B    magenta   #C57BDB
#   cyan      #5cEfFF

general {
    gaps_in         = 4
    gaps_out        = 8
    border_size     = 2

    # Active: blue → magenta gradient; inactive: dim border
    col.active_border   = rgba(51afefff) rgba(C57BDBff) 45deg
    col.inactive_border = rgba(484854aa)

    resize_on_border    = true
    extend_border_grab_area = 8
    allow_tearing       = false
    layout              = dwindle
}

decoration {
    rounding            = 8
    active_opacity      = 1.0
    inactive_opacity    = 0.95
    fullscreen_opacity  = 1.0

    shadow {
        enabled         = true
        range           = 14
        render_power    = 2
        color           = rgba(1c1f24cc)
        color_inactive  = rgba(1c1f2488)
    }

    blur {
        enabled             = true
        size                = 6
        passes              = 3
        new_optimizations   = true
        xray                = false
        noise               = 0.0117
        contrast            = 0.8916
        brightness          = 0.8172
        popups              = true
    }
}

animations {
    enabled = true

    # Doom-inspired easing curves
    bezier = doom,    0.05, 0.9,  0.1, 1.05
    bezier = linear,  0.0,  0.0,  1.0, 1.0
    bezier = easeOut, 0.0,  0.0,  0.2, 1.0
    bezier = easeIn,  0.4,  0.0,  1.0, 1.0
    bezier = spring,  0.25, 1.0,  0.5, 1.0

    animation = windows,          1, 4, doom,   slide
    animation = windowsOut,       1, 3, easeIn, slide
    animation = windowsMove,      1, 3, doom
    animation = border,           1, 6, linear
    animation = borderangle,      1, 30, linear, loop
    animation = fade,             1, 4, doom
    animation = workspaces,       1, 4, spring, slidevert
    animation = specialWorkspace, 1, 4, spring, slide
    animation = layers,           1, 3, doom,   slide
}

dwindle {
    pseudotile      = true
    preserve_split  = true
}

master {
    new_status          = master
    mfact               = 0.55
    orientation         = left
}

misc {
    force_default_wallpaper     = 0
    disable_hyprland_logo       = true
    disable_splash_rendering    = true
    mouse_move_enables_dpms     = true
    key_press_enables_dpms      = true
    vfr                         = true   # variable frame-rate — saves power
    focus_on_activate           = false
}

#############
### INPUT ###
#############

input {
    kb_layout   = de
    kb_options  = caps:escape   # Caps Lock → Escape (Doom/vim essential)

    follow_mouse    = 1
    sensitivity     = 0
    accel_profile   = adaptive

    touchpad {
        natural_scroll          = true
        scroll_factor           = 0.5
        disable_while_typing    = true
        tap-to-click            = true
        tap-and-drag            = true
        drag_lock               = true
        middle_button_emulation = false
        clickfinger_behavior    = false
    }
}

# 3-finger horizontal swipe switches workspaces
gesture = 3, horizontal, workspace

cursor {
    inactive_timeout = 5
    hide_on_key_press = true
}

#############
### BINDS ###
#############

# Legend: $mainMod = SUPER (like SPC in Doom Emacs)
#   SUPER+<key>       → leader + key (workspace, focus, launch)
#   SUPER+SHIFT+<key> → leader + SHIFT (destructive / move operations)
#   SUPER+CTRL+<key>  → system / session operations
#   Submaps below act like Doom key-chord prefixes (SPC w, SPC b, etc.)

$mainMod = SUPER

# ── Core: open / launch ─────────────────────────────────────────────────────
# SPC o t — open terminal
bind = $mainMod, Return,       exec, $terminal
# SPC SPC / M-x — launcher (rofi drun). Alternatives on modifier variants so
# you can pick a favourite: walker / anyrun / vicinae (see home/launchers.nix).
bind = $mainMod, Space,            exec, $launcher
bind = $mainMod SHIFT, Space,      exec, walker
bind = $mainMod CTRL, Space,       exec, anyrun
bind = $mainMod ALT, Space,        exec, vicinae vicinae://toggle
# Toggle the eww nerdy system overlay
bind = $mainMod SHIFT, E,          exec, eww open --toggle syspanel
# SPC o b — browser
bind = $mainMod, B,            exec, $browser
# SPC o e — emacs client
bind = $mainMod, A,            exec, emacsclient -c -a ""
# SPC o f — file manager
bind = $mainMod, E,            exec, $fileManager
# SPC o - — open a second terminal side-by-side
bind = $mainMod SHIFT, Return, exec, $terminal

# ── Core: window control ─────────────────────────────────────────────────────
# SPC b k / SPC b d — kill window (buffer kill)
bind = $mainMod, Q,            killactive
# SPC w v — split vertical (new pane to the right)
bind = $mainMod, V,            togglesplit
# SPC t f — toggle floating
bind = $mainMod SHIFT, V,      togglefloating
# SPC w z / SPC t z — fullscreen
bind = $mainMod, F,            fullscreen, 0
# SPC w m — maximize (no gaps)
bind = $mainMod SHIFT, F,      fullscreen, 1
# SPC t p — pin floating window on top
bind = $mainMod, I,            pin

# ── Focus: vim hjkl (SPC w h/j/k/l) ─────────────────────────────────────────
bind = $mainMod, H,            movefocus, l
bind = $mainMod, J,            movefocus, d
bind = $mainMod, K,            movefocus, u
bind = $mainMod, L,            movefocus, r

# Arrow keys as fallback
bind = $mainMod, left,         movefocus, l
bind = $mainMod, down,         movefocus, d
bind = $mainMod, up,           movefocus, u
bind = $mainMod, right,        movefocus, r

# ── Move windows (SPC w H/J/K/L) ─────────────────────────────────────────────
bind = $mainMod SHIFT, H,      movewindow, l
bind = $mainMod SHIFT, J,      movewindow, d
bind = $mainMod SHIFT, K,      movewindow, u
bind = $mainMod SHIFT, L,      movewindow, r

# ── Workspaces: go to (SPC b 1-9, like SPC b n/p for next/prev) ──────────────
bind = $mainMod, 1,            workspace, 1
bind = $mainMod, 2,            workspace, 2
bind = $mainMod, 3,            workspace, 3
bind = $mainMod, 4,            workspace, 4
bind = $mainMod, 5,            workspace, 5
bind = $mainMod, 6,            workspace, 6
bind = $mainMod, 7,            workspace, 7
bind = $mainMod, 8,            workspace, 8
bind = $mainMod, 9,            workspace, 9
bind = $mainMod, 0,            workspace, 10

# Next / previous workspace (SPC b n / SPC b p)
# Using CTRL+arrow for DE-keyboard friendliness; also hjkl with ALT
bind = $mainMod, bracketright, workspace, +1   # ] / ü on DE layout
bind = $mainMod, bracketleft,  workspace, -1   # [ / ö on DE layout
bind = $mainMod ALT, L,        workspace, +1
bind = $mainMod ALT, H,        workspace, -1
bind = $mainMod, Tab,          workspace, previous

# ── Workspaces: move window to (SPC b m 1-9) ─────────────────────────────────
bind = $mainMod SHIFT, 1,      movetoworkspace, 1
bind = $mainMod SHIFT, 2,      movetoworkspace, 2
bind = $mainMod SHIFT, 3,      movetoworkspace, 3
bind = $mainMod SHIFT, 4,      movetoworkspace, 4
bind = $mainMod SHIFT, 5,      movetoworkspace, 5
bind = $mainMod SHIFT, 6,      movetoworkspace, 6
bind = $mainMod SHIFT, 7,      movetoworkspace, 7
bind = $mainMod SHIFT, 8,      movetoworkspace, 8
bind = $mainMod SHIFT, 9,      movetoworkspace, 9
bind = $mainMod SHIFT, 0,      movetoworkspace, 10

# Move window to next/prev workspace silently
bind = $mainMod ALT SHIFT, L, movetoworkspacesilent, +1
bind = $mainMod ALT SHIFT, H, movetoworkspacesilent, -1

# ── Special workspace (scratchpad — SPC t s) ─────────────────────────────────
bind = $mainMod, minus,        togglespecialworkspace, scratch
bind = $mainMod SHIFT, minus,  movetoworkspacesilent,  special:scratch

# ── Clipboard history (M-y / SPC y — consult-yank-pop feel) ──────────────────
bind = $mainMod, Y,            exec, $clipMenu

# ── Screenshots (like flameshot in EXWM) ─────────────────────────────────────
bind = ,       Print,          exec, grimblast --notify copy area
bind = SHIFT,  Print,          exec, grimblast --notify copy output
bind = $mainMod, Print,        exec, grimblast --notify save screen ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod SHIFT, Print,  exec, grimblast --notify copy active

# ── Lock / session (SPC q — quit prefix in Doom) ─────────────────────────────
# Lock: SUPER+Escape (SUPER+L is reserved for Doom-style movefocus-right)
bind = $mainMod, Escape,          exec, $locker
# Power menu: SUPER+SHIFT+Escape
bind = $mainMod SHIFT, Escape,    exec, $powerMenu
# Hard exit Hyprland (SUPER+CTRL+Q)
bind = $mainMod CTRL, Q,          exit

# ── Hyprland reload ──────────────────────────────────────────────────────────
bind = $mainMod CTRL, R,       exec, hyprctl reload

# ── Color picker ─────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, C,      exec, $colorPick

# ── Resize submap (SPC w r → resize mode, like evil-window-resize) ───────────
bind  = $mainMod, R,           submap, resize
submap = resize
  binde = , H,     resizeactive, -30  0
  binde = , L,     resizeactive,  30  0
  binde = , K,     resizeactive,   0 -20
  binde = , J,     resizeactive,   0  20
  binde = , left,  resizeactive, -30  0
  binde = , right, resizeactive,  30  0
  binde = , up,    resizeactive,   0 -20
  binde = , down,  resizeactive,   0  20
  bind  = , Return,  submap, reset
  bind  = , Escape,  submap, reset
  bind  = , Q,       submap, reset
submap = reset

# ── Media keys ───────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@   5%+ && swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@   5%- && swayosd-client --output-volume lower
bindl  = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@   toggle && swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ── Brightness ────────────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set  +5% && swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, brightnessctl set   5%- && swayosd-client --brightness lower

# ── Mouse: drag / resize floating windows ────────────────────────────────────
bindm = $mainMod, mouse:272,   movewindow
bindm = $mainMod, mouse:273,   resizewindow

# ── Mouse scroll on empty desktop ────────────────────────────────────────────
bind = $mainMod, mouse_down,   workspace, e+1
bind = $mainMod, mouse_up,     workspace, e-1

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Suppress maximize requests — Hyprland handles fullscreen natively
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# ── Floating rules ────────────────────────────────────────────────────────────
windowrule {
    name = float-misc
    match:class = ^(nm-applet|blueman-manager|pavucontrol|wlogout|org\.kde\.ark|org\.kde\.kcalc|gnome-calculator|swappy|hyprpicker)$
    float = true
}
windowrule {
    name = float-dialogs
    match:title = ^(Open File|Save As|Confirm|Picture-in-Picture|Firefox — Sharing Indicator)
    float = true
}

# ── Float sizes ──────────────────────────────────────────────────────────────
windowrule {
    name = size-pavucontrol
    match:class = ^(pavucontrol)$
    size = 900 600
    center = true
}
windowrule {
    name = size-nm-editor
    match:class = ^(nm-connection-editor)$
    size = 1000 700
    center = true
}
windowrule {
    name = size-blueman
    match:class = ^(blueman-manager)$
    size = 800 600
    center = true
}
windowrule {
    name = center-swappy
    match:class = ^(swappy)$
    center = true
}

# ── Workspace pin: apps go to their "natural" workspace on open ───────────────
windowrule {
    name = ws-browser
    match:class = ^(firefox|vivaldi-stable|brave-browser|google-chrome|chromium-browser)$
    workspace = 2
}
windowrule {
    name = ws-emacs
    match:class = ^([Ee]macs)$
    workspace = 3
}
windowrule {
    name = ws-mail
    match:class = ^(thunderbird)$
    workspace = 4
}
windowrule {
    name = ws-chat
    match:class = ^(telegram-desktop|beeper|Element)$
    workspace = 5
}
windowrule {
    name = ws-cloud
    match:class = ^(org\.nextcloud\.desktopclient)$
    workspace = 6
}
windowrule {
    name = ws-notes
    match:class = ^(anytype)$
    workspace = 7
}
windowrule {
    name = ws-tasks
    match:class = ^(super-productivity)$
    workspace = 8
}
windowrule {
    name = ws-spotify
    match:class = ^(Spotify)$
    workspace = 9
}
windowrule {
    name = ws-bitwarden
    match:class = ^(bitwarden|com\.bitwarden\.desktop)$
    workspace = 10
}

# ── Opacity: terminals slightly transparent when unfocused ───────────────────
windowrule {
    name = opacity-terminals
    match:class = ^(kitty|Alacritty|org\.wezfurlong\.wezterm|com\.mitchellh\.ghostty)$
    opacity = 1.0 override 0.88 override
}

# ── Layer rules for blur on waybar / rofi / mako ─────────────────────────────
layerrule {
    name = blur-bars
    match:namespace = waybar|rofi|mako
    blur = true
}

