# Yazi — main config (yazi 26.x schema, [mgr] not [manager]).
#
# Doom-Emacs-flavoured file manager for Hyprland: runs in the terminal
# (ghostty, kitty-graphics image previews), tiled like everything else.
# Palette + keymap mirror the rest of the system:
#   - colours  → Doom Vibrant (see theme.toml, sourced from doom-vibrant-theme.el)
#   - keybinds → SPC leader à la hlissner's Doom (see keymap.toml)
#
# Plugins are symlinked into ~/.config/yazi/plugins by home/yazi.nix (from
# pkgs.yaziPlugins) and initialised in init.lua.

[mgr]
ratio          = [1, 3, 4] # parent : current : preview — wide preview pane
sort_by        = "natural" # 2 < 10, human ordering
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size_and_mtime" # custom linemode from init.lua
show_hidden    = false     # toggle with `.` / SPC t h
show_symlink   = true
scrolloff      = 5         # keep 5 rows of context above/below cursor
mouse_events   = ["click", "scroll"]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1200
max_height      = 1800
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 90
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'hx "$@"',              desc = "Helix",        block = true, for = "unix" },
  { run = '$EDITOR "$@"',         desc = "$EDITOR",      block = true, for = "unix" },
  { run = 'nvim "$@"',            desc = "Neovim",       block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$1"',        desc = "Open",         orphan = true, for = "unix" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal in file manager", orphan = true, for = "unix" },
  { run = 'exiftool "$1"; echo "Press enter to exit"; read _', desc = "Show EXIF", block = true, for = "unix" },
]
play = [
  { run = 'mpv --force-window "$@"', desc = "mpv",       orphan = true, for = "unix" },
]
extract = [
  { run = 'ouch decompress "$@"', desc = "Extract (ouch)", for = "unix" },
]

[open]
rules = [
  { url = "*/",                                 use = ["edit", "open", "reveal"] },

  { mime = "text/*",                            use = ["edit", "reveal"] },
  { mime = "application/{json,x-ndjson,javascript,x-yaml,x-toml}", use = ["edit", "reveal"] },
  { mime = "application/{subrip,x-subrip}",     use = ["edit", "reveal"] },

  { mime = "image/*",                           use = ["open", "reveal"] },
  { mime = "{audio,video}/*",                   use = ["play", "reveal"] },
  { mime = "application/pdf",                   use = ["open", "reveal"] },

  { mime = "application/{,g}zip",               use = ["extract", "reveal"] },
  { mime = "application/x-{tar,bzip2,7z-compressed,xz,rar,zstd}", use = ["extract", "reveal"] },

  { mime = "inode/x-empty",                     use = ["edit", "reveal"] },
  { mime = "*",                                 use = ["open", "reveal"] },
]

# ── Plugin wiring ───────────────────────────────────────────────────────────
# `git` decorates the file list with VCS status flags; needs a fetcher +
# preloader here plus `require("git"):setup()` in init.lua.
[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"

[[plugin.prepend_previewers]]
mime = "application/*zip"
run  = "ouch"

[[plugin.prepend_previewers]]
mime = "application/x-{tar,bzip2,7z-compressed,xz,rar,zstd}"
run  = "ouch"
