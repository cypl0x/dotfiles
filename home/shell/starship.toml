# Starship prompt configuration
# Optimized for ShellFish iOS portrait mode
# Documentation: https://starship.rs/config/
# Color scheme: Doom Vibrant (based on doom-vibrant theme)

# Compact spacing for mobile
add_newline = true

# Timeout for starship to scan files (milliseconds)
scan_timeout = 30
command_timeout = 500

# Compact two-line format for narrow screens
format = """
$os\
$username\
[@](bold #484854)\
$hostname\
[:](bold #484854)\
$directory\
$git_branch\
$git_status\
$nix_shell\
$battery
$character"""

# Minimal continuation prompt
continuation_prompt = "❯ "

[character]
success_symbol = "[❯](bold #7bc275)"
error_symbol = "[❯](bold #ff665c)"
vicmd_symbol = "[❮](bold #7bc275)"

[os]
disabled = false
format = "[$symbol ]($style)"
style = "bold #51afef"

[os.symbols]
NixOS = "󱄅"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
CentOS = "󱄚"
Debian = "󰣚"
Fedora = ""
FreeBSD = ""
Gentoo = ""
Linux = ""
Macos = ""
Manjaro = ""
openSUSE = ""
Raspbian = ""
RedHatEnterprise = ""
Redhat = "󱄛"
Ubuntu = "󰕈"
Unknown = ""
Windows = ""

[username]
show_always = true
style_user = "bold #51afef"
style_root = "bold #ff665c"
format = "[$user]($style)"

[hostname]
ssh_only = false
format = "[$hostname](bold #51afef)"
disabled = false
trim_at = "."

[directory]
truncation_length = 2
truncate_to_repo = true
style = "bold #5cEfFF"
read_only = "󰌾"
read_only_style = "bold #ff665c"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_symbol = "…/"
home_symbol = "~"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bold #C57BDB"
format = "[$symbol$branch]($style) "
truncation_length = 20
truncation_symbol = "…"

[git_status]
style = "bold #ff665c"
format = "([$all_status$ahead_behind]($style))"
conflicted = "="
ahead = "⇡$count"
behind = "⇣$count"
diverged = "⇕$count"
untracked = "?$count"
stashed = "$"
modified = "!$count"
staged = "+$count"
renamed = "»$count"
deleted = "✘$count"

[git_state]
format = '[$state]($style) '
cherry_pick = "[PICK](bold #ff665c)"
rebase = "[REBASE](bold #FCCE7B)"
merge = "[MERGE](bold #FCCE7B)"

[cmd_duration]
min_time = 1000
format = "[$duration](bold #e69055) "
show_milliseconds = false
style = "bold #e69055"

# Language and tool modules (compact)
[nodejs]
symbol = ""
format = "[$symbol$version]($style) "
detect_extensions = ["js", "mjs", "cjs", "ts"]
style = "bold #7bc275"

[python]
symbol = ""
format = '[$symbol$version]($style) '
pyenv_version_name = false
style = "bold #FCCE7B"

[rust]
symbol = ""
format = "[$symbol$version]($style) "
style = "bold #e69055"

[golang]
symbol = ""
format = "[$symbol$version]($style) "
style = "bold #51afef"

[docker_context]
symbol = ""
format = "[$symbol$context]($style) "
only_with_files = true
style = "bold #5cEfFF"

[package]
symbol = "📦"
format = "[$symbol$version]($style) "
style = "bold #a991f1"

[terraform]
symbol = "󱁢"
format = "[$symbol$version]($style) "
style = "bold #C57BDB"

[nix_shell]
symbol = ""
format = '[$symbol$state]($style) '
style = "bold #51afef"
impure_msg = '[!](bold #ff665c)'
pure_msg = '[✓](bold #7bc275)'

# Cloud providers
[aws]
symbol = " "
format = 'on [$symbol($profile )(\($region\) )(\[$duration\] )]($style)'
disabled = true

[gcloud]
format = 'on [$symbol$account(@$domain)(\($region\))]($style) '
disabled = true

# Battery (enabled for mobile)
[battery]
disabled = false
full_symbol = "󰁹"
charging_symbol = "󰂄"
discharging_symbol = "󰂃"
unknown_symbol = "󰁽"
empty_symbol = "󰂎"
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 15
style = "bold #ff665c"

[[battery.display]]
threshold = 30
style = "bold #FCCE7B"

[[battery.display]]
threshold = 100
style = "bold #7bc275"

# Time
[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"
utc_time_offset = "local"
style = "bold #FCCE7B"

# Memory usage
[memory_usage]
disabled = true
threshold = 75
format = "via $symbol[${ram_pct}]($style) "
symbol = "󰍛 "
style = "bold #e69055"

# Status
[status]
disabled = false
format = '[\[$symbol$status\]]($style) '
symbol = "✖"
not_executable_symbol = "🚫"
not_found_symbol = "🔍"
sigint_symbol = "🧱"
signal_symbol = "⚡"
style = "bold #ff665c"
