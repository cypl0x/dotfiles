# ==============================================================================
# General Settings
# ==============================================================================

# Use Doom-like prefix 'C-Space', keep C-b as secondary prefix
set-option -g prefix C-Space
set-option -g prefix2 C-b
bind-key C-Space send-prefix

# Mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# History limit
set -g history-limit 50000

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Refresh status line more often
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# ==============================================================================
# Key Bindings
# ==============================================================================

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Doom-evil inspired mux bindings (match wezterm)
bind Space send-prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

bind w switch-client -T window
bind b switch-client -T buffer
bind p switch-client -T project
bind t switch-client -T toggle
bind o switch-client -T open

bind [ copy-mode
bind f choose-tree -Z
bind / command-prompt -i -p "search" "copy-mode \; send-keys -X search-forward %%"
bind u clear-history

bind -T window w display-panes \; switch-client -T root
bind -T window v split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind -T window s split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind -T window c kill-pane \; switch-client -T root
bind -T window z resize-pane -Z \; switch-client -T root
bind -T window = select-layout tiled \; switch-client -T root
bind -T window Escape switch-client -T root

bind -T buffer n next-window \; switch-client -T root
bind -T buffer p previous-window \; switch-client -T root
bind -T buffer b choose-window \; switch-client -T root
bind -T buffer k kill-window \; switch-client -T root
bind -T buffer c new-window -c "#{pane_current_path}" \; switch-client -T root
bind -T buffer 1 select-window -t 1 \; switch-client -T root
bind -T buffer 2 select-window -t 2 \; switch-client -T root
bind -T buffer 3 select-window -t 3 \; switch-client -T root
bind -T buffer 4 select-window -t 4 \; switch-client -T root
bind -T buffer 5 select-window -t 5 \; switch-client -T root
bind -T buffer 6 select-window -t 6 \; switch-client -T root
bind -T buffer 7 select-window -t 7 \; switch-client -T root
bind -T buffer 8 select-window -t 8 \; switch-client -T root
bind -T buffer 9 select-window -t 9 \; switch-client -T root
bind -T buffer Escape switch-client -T root

bind -T project s choose-tree -Z \; switch-client -T root
bind -T project w choose-session \; switch-client -T root
bind -T project n command-prompt -p "New session name" "new-session -d -s '%%' \; switch-client -t '%%'" \; switch-client -T root
bind -T project Escape switch-client -T root

bind -T toggle f if -F '#{==:#{status},on}' 'set -g status off' 'set -g status on' \; switch-client -T root
bind -T toggle z resize-pane -Z \; switch-client -T root
bind -T toggle d show-messages \; switch-client -T root
bind -T toggle Escape switch-client -T root

bind -T open l choose-tree -Z \; switch-client -T root
bind -T open t new-window -c "#{pane_current_path}" \; switch-client -T root
bind -T open s split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind -T open v split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind -T open Escape switch-client -T root

# ==============================================================================
# Status Bar / Theme
# ==============================================================================

# Status position
set -g status-position bottom
set -g status-justify left

# Colors (Doom Vibrant)
set -g status-style "bg=#242730,fg=#bbc2cf"
set -g window-status-current-style "bg=#51afef,fg=#1c1f24,bold"
set -g pane-border-style "fg=#484854"
set -g pane-active-border-style "fg=#51afef"
set -g message-style "bg=#2a2e38,fg=#bbc2cf"

# Status Left
set -g status-left-length 100
set -g status-left "#[fg=#1c1f24,bg=#51afef,bold] #S #[fg=#51afef,bg=#242730] "

# Status Right
set -g status-right-length 100
set -g status-right "#[fg=#62686E] %Y-%m-%d %H:%M "

# Window Status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# ==============================================================================
# Copy Mode (Vim style)
# ==============================================================================

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Mouse wheel: pass through in alternate screen (e.g. vterm), otherwise enter copy-mode
bind -n WheelUpPane if-shell -F "#{alternate_on}" "send-keys -M" "copy-mode -e"
bind -n WheelDownPane if-shell -F "#{alternate_on}" "send-keys -M" "send-keys -M"
