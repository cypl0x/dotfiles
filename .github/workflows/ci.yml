name: NixOS Configuration CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Detect which host configs a push actually touches, so we don't spend 30+
  # minutes building a host that didn't change.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      inari: ${{ steps.filter.outputs.inari }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            inari:
              - 'hosts/inari/**'
              - 'home/proxy*.nix'
              - 'home/fabian.nix'
              - 'flake.nix'
              - 'flake.lock'

  lint-and-check:
    name: Lint and Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          name: cypl0x
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check formatting with treefmt
        run: nix develop -c make fmt-check

      - name: Run statix linter
        run: nix develop -c make lint-statix

      - name: Run deadnix linter
        run: nix develop -c make lint-deadnix

      - name: Run shellcheck linter
        run: nix develop -c make lint-shellcheck

      - name: Run flake checks
        run: nix flake check --all-systems

  build-thinkpad:
    name: Build thinkpad configuration
    runs-on: ubuntu-latest
    needs: lint-and-check
    steps:
      # Building a full NixOS system closure overflows the stock ~14 GB runner
      # disk ("No space left on device"). Reclaim ~25 GB first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          name: cypl0x
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build thinkpad configuration
        run: nix build .#nixosConfigurations.thinkpad.config.system.build.toplevel -L

      - name: Show build info
        run: |
          if [ -L result ]; then
            echo "Build successful!"
            ls -lh result
            nix path-info ./result --size --closure-size --human-readable
          fi

  build-inari:
    name: Build inari configuration
    runs-on: ubuntu-latest
    needs: [lint-and-check, changes]
    # inari is a large server closure (authentik, n8n, homeassistant, openclaw)
    # whose overlay forces a from-source rebuild that OOM-kills a free runner
    # (exit 143). Only attempt it when inari-relevant files change, AND treat it
    # as best-effort so the resource limit doesn't red the whole pipeline —
    # lint/format and the thinkpad build still block on real failures. Long-term
    # fix: prime cachix from a capable machine so CI just downloads the closure.
    if: needs.changes.outputs.inari == 'true'
    continue-on-error: true
    steps:
      # Building a full NixOS system closure overflows the stock ~14 GB runner
      # disk ("No space left on device"). Reclaim ~25 GB first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          name: cypl0x
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build inari configuration
        run: nix build .#nixosConfigurations.inari.config.system.build.toplevel -L

      - name: Show build info
        run: |
          if [ -L result ]; then
            echo "Build successful!"
            ls -lh result
            nix path-info ./result --size --closure-size --human-readable
          fi

  check-documentation:
    name: Check documentation
    runs-on: ubuntu-latest
    needs: lint-and-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          name: cypl0x
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build documentation
        run: nix build .#nixosConfigurations.thinkpad.config.system.build.documentation 2>/dev/null || echo "Documentation build not available as separate output"

      - name: Check markdown files exist
        run: |
          echo "Checking documentation files..."
          for doc in README.md SECURITY.md; do
            if [ -f "$doc" ]; then
              echo "✓ $doc exists"
            else
              echo "✗ $doc missing"
              exit 1
            fi
          done
